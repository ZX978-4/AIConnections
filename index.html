<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI模型血缘关系可视化 - API版</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link rel="stylesheet" href="static/styles.css">
    <base target="_blank">
</head>

<body>
    <div class="container">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <h1>🔗 模型血缘查询</h1>

            <!-- 搜索 -->
            <div class="section">
                <label>搜索模型</label>
                <input type="text" id="searchInput" placeholder="输入模型名称..." autocomplete="off">
                <div class="search-results" id="searchResults" style="display: none;"></div>
            </div>

            <!-- 当前选中 -->
            <div class="section" id="currentModelSection" style="display: none;">
                <label>当前选中</label>
                <div style="background: #1a1a1a; border: 1px solid #333; border-radius: 4px; padding: 10px;">
                    <div id="currentModelName" style="font-size: 14px; color: #61dafb; margin-bottom: 4px;"></div>
                    <div id="currentModelMeta" style="font-size: 11px; color: #666;"></div>
                    <div style="margin-top:8px; display:flex; gap:8px; align-items:center;">
                        <button class="btn" id="licenseBtn" style="font-size:12px;padding:6px 8px;">🔏 证书检测</button>
                        <button class="btn" id="riskBtn" style="font-size:12px;padding:6px 8px;">🛡️ 安全检测</button>
                    </div>
                    <div id="licenseResult" style="margin-top:8px; font-size:12px;color:#ccc;" aria-live="polite"></div>
                    <div id="riskResult" style="margin-top:8px; font-size:12px;color:#ccc;" aria-live="polite"></div>
                </div>
            </div>

            <!-- 深度控制 已移除：默认显示最高层 -->

            <!-- 关系标签页 -->
            <div class="section">
                <div class="tabs">
                    <div class="tab active" data-tab="parents">上游</div>
                    <div class="tab" data-tab="children">下游</div>
                </div>

                <div class="panel active" id="parentsPanel">
                    <div style="color: #666; font-size: 12px; text-align: center; padding: 20px;">
                        搜索并选择模型查看上游依赖
                    </div>
                </div>

                <div class="panel" id="childrenPanel">
                    <div style="color: #666; font-size: 12px; text-align: center; padding: 20px;">
                        搜索并选择模型查看下游衍生
                    </div>
                </div>
            </div>

            <!-- 统计 -->
            <div class="section">
                <label>统计信息</label>
                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="value" id="statAncestors">-</div>
                        <div class="label">上游节点</div>
                    </div>
                    <div class="stat-box">
                        <div class="value" id="statDescendants">-</div>
                        <div class="label">下游节点</div>
                    </div>
                    <!-- 总相关统计已移除 -->
                    <!-- 最大深度统计已移除 -->
                </div>
            </div>


        </div>

        <!-- 主画布 -->
        <div class="main">
            <div class="info-bar" id="infoBar" style="display: none;">
                <div class="info-item">
                    <div class="value" id="infoName">-</div>
                    <div class="label">模型/数据集</div>
                </div>
                <div class="info-item">
                    <div class="value" id="infoAuthor">-</div>
                    <div class="label">作者</div>
                </div>
                <div class="info-item">
                    <div class="value" id="infoDownloads">-</div>
                    <div class="label">下载量</div>
                </div>
            </div>

            <div id="graph">
                <div class="loading">连接后端API...</div>
            </div>

            <div class="legend-container">
                <!-- 节点颜色说明 -->
                <div class="legend-section">
                    <div class="legend-header" onclick="toggleLegend('node-legend')">
                        <span>节点颜色</span>
                        <span class="toggle-icon">▼</span>
                    </div>
                    <div class="legend-content" id="node-legend" style="display: none;">
                        <div class="legend-item">
                            <div class="legend-dot" style="background: #ff8a80;"></div>
                            <span>上游依赖</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-dot" style="background: #81d4fa;"></div>
                            <span>下游衍生</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-dot" style="background: #ba68c8;"></div>
                            <span>数据集</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-dot" style="background: #ffeb3b;"></div>
                            <span>选中的模型/数据集</span>
                        </div>
                    </div>
                </div>
                
                <!-- 边的颜色说明 -->
                <div class="legend-section">
                    <div class="legend-header" onclick="toggleLegend('edge-legend')">
                        <span>边的颜色</span>
                        <span class="toggle-icon">▼</span>
                    </div>
                    <div class="legend-content" id="edge-legend" style="display: none;">
                        <!-- 边的颜色说明将由JavaScript动态生成 -->
                    </div>
                </div>
            </div>

            <div class="tooltip" id="tooltip"></div>
        </div>
    </div>

    <script src="static/app.js"></script>
</body>

</html>
